# pytest.ini - Pytest Configuration
# AI-Form API Test Suite
# -------------------------------
# @Author: api-tester
# @Time: 2025/03/17
# @Desc: Pytest configuration for comprehensive API testing
# -------------------------------

[pytest]
# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum pytest version
minversion = 7.0

# Required plugins
required_plugins =
    pytest-cov>=4.0.0
    pytest-mock>=3.10.0

# Command-line options (default)
addopts =
    # Verbose output
    -v
    # Show extra test summary info
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Coverage settings
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    # Warnings
    -W ignore::DeprecationWarning
    # Strict markers
    --strict-markers
    # Parallel execution (requires pytest-xdist)
    # -n auto

# Markers for test categorization
markers =
    auth: Authentication tests
    security: Security validation tests
    performance: Performance tests
    integration: Integration tests
    slow: Slow running tests
    unit: Unit tests

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file = tests/test_results.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::UserWarning

# Timeout settings (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Test ordering
# Run fast tests first, slow tests last

# Coverage configuration
[coverage:run]
source = .
omit =
    tests/*
    */migrations/*
    */__pycache__/*
    */site-packages/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
show_missing = True

[coverage:html]
directory = htmlcov

# pytest-mock settings
[mock]
mock_traceback_monkeypatch = false